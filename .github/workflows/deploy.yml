name: Deploy

on:
  push:
    branches: [master, main]

jobs:
  # ── Deploy Cloudflare Worker ────────────────────────────────────────────────
  deploy-worker:
    name: Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            TAOSTATS_API_KEY
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}

      - name: Set cron triggers
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/predict-worker/schedules" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '[{"cron":"0 2 * * *"},{"cron":"20 2 * * *"},{"cron":"40 2 * * *"},{"cron":"0 */4 * * *"},{"cron":"30 */4 * * *"}]'

  # ── Build & Deploy Cloudflare Pages ────────────────────────────────────────
  deploy-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build frontend
        run: cd frontend && npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=pre-tao --commit-dirty=true
